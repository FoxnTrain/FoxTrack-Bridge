name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: windows-latest
            goos: windows
            goarch: amd64
            asset: FoxTrack-Bridge-Windows.exe

          - os: macos-intel
            runner: macos-latest
            goos: darwin
            goarch: amd64
            asset: FoxTrack-Bridge-macOS-Intel

          - os: macos-arm
            runner: macos-latest
            goos: darwin
            goarch: arm64
            asset: FoxTrack-Bridge-macOS-Apple-Silicon

          - os: linux
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            asset: FoxTrack-Bridge-Linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install Linux system dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing gcc libgtk-3-dev libayatana-appindicator3-dev

      - name: Build (Windows — no console window)
        if: matrix.goos == 'windows'
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 1
        # -H windowsgui hides the console so the app runs silently in the tray
        run: go build -ldflags="-s -w -H windowsgui" -o FoxTrack-Bridge-Windows.exe .

      - name: Build (macOS / Linux)
        if: matrix.goos != 'windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: go build -ldflags="-s -w" -o ${{ matrix.asset }} .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
